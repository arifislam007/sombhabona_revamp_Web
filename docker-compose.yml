services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sombhabona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sombhabona}
      POSTGRES_DB: ${POSTGRES_DB:-sombhabona}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sombhabona}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sombhabona}:${POSTGRES_PASSWORD:-sombhabona}@db:5432/${POSTGRES_DB:-sombhabona}?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-info@sombhabona.org}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-https://tokenized.sandbox.bka.sh/v1.2.0-beta}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
    expose:
      - "3000"

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  db-data:
